<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover lets the app draw under the iPhone notch / home bar -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Pulse · Fitness Tracker</title>
  <meta name="description" content="A private, offline-first gym & fitness tracker. All your data stays on your device." />

  <!-- iOS PWA / home-screen behaviour -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pulse" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="assets/icon.svg" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.webmanifest" />

  <!-- theme-color adapts to light/dark so the iOS status bar blends in -->
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- App root. Views are rendered into <main id="view"> by app.js -->
  <div id="app">
    <main id="view" class="view" role="main"><!-- rendered by app.js --></main>

    <!-- Fixed bottom tab bar (iOS-style) — Home · Workouts · Progress · History · Settings -->
    <nav id="tabbar" class="tabbar" role="navigation" aria-label="Primary">
      <button class="tab" data-action="nav" data-view="home" aria-label="Home">
        <svg viewBox="0 0 24 24" class="tab-icon" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"/></svg>
        <span>Home</span>
      </button>
      <button class="tab" data-action="nav" data-view="workouts" aria-label="Workouts">
        <svg viewBox="0 0 24 24" class="tab-icon" aria-hidden="true"><path d="M6.5 6.5 17.5 17.5"/><path d="M4 8.5 8.5 4M15.5 20 20 15.5"/><path d="M3 11 5 13M11 3l2 2M19 11l2 2M11 19l2 2"/></svg>
        <span>Workouts</span>
      </button>
      <button class="tab" data-action="nav" data-view="progress" aria-label="Progress">
        <svg viewBox="0 0 24 24" class="tab-icon" aria-hidden="true"><path d="M4 19V5M4 19h16"/><path d="M8 16l3.5-4 3 2.5L20 8"/></svg>
        <span>Progress</span>
      </button>
      <button class="tab" data-action="nav" data-view="history" aria-label="History">
        <svg viewBox="0 0 24 24" class="tab-icon" aria-hidden="true"><path d="M12 7v5l3 2"/><circle cx="12" cy="12" r="8.5"/></svg>
        <span>History</span>
      </button>
      <button class="tab" data-action="nav" data-view="settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" class="tab-icon" aria-hidden="true"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 13a7.6 7.6 0 0 0 0-2l1.7-1.3-1.6-2.8-2 .7a7.6 7.6 0 0 0-1.8-1l-.3-2.1H10.6l-.3 2.1a7.6 7.6 0 0 0-1.8 1l-2-.7L4.9 9.7 6.6 11a7.6 7.6 0 0 0 0 2l-1.7 1.3 1.6 2.8 2-.7a7.6 7.6 0 0 0 1.8 1l.3 2.1h3.2l.3-2.1a7.6 7.6 0 0 0 1.8-1l2 .7 1.6-2.8z"/></svg>
        <span>Settings</span>
      </button>
    </nav>
  </div>

  <!-- Overlays -->
  <div id="modal-root"></div>
  <div id="toast-root" aria-live="polite"></div>

  <!-- Scripts: data layer first, then app -->
  <!-- Google Identity Services for Google Drive sync (loads async, safe if offline) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
